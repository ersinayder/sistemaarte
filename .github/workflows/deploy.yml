name: Deploy Producao

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: self-hosted

    env:
      HOMEPATH: C:\Users\Administrator
      HOME: C:\Users\Administrator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # FRONTEND
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy frontend dist
        shell: powershell
        run: |
          $source = "${{ github.workspace }}\frontend\dist\"
          $dest   = "C:\sistemaarte\frontend\dist"
          if (!(Test-Path $dest)) { New-Item -ItemType Directory -Path $dest -Force }
          robocopy $source $dest /MIR /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      # PARAR PM2 antes de copiar backend
      - name: Stop PM2
        shell: powershell
        run: |
          $env:HOMEPATH = "C:\Users\Administrator"
          $env:HOME     = "C:\Users\Administrator"
          pm2 stop sistemaarte-backend 2>$null; $true
          Start-Sleep -Seconds 3

      # BACKEND
      - name: Sync backend source
        shell: powershell
        run: |
          $source = "${{ github.workspace }}\backend\"
          $dest   = "C:\sistemaarte\backend"
          if (!(Test-Path $dest)) { New-Item -ItemType Directory -Path $dest -Force }
          robocopy $source $dest /MIR /NFL /NDL /NJH /NJS `
            /XD node_modules data `
            /XF .env *.db
          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      - name: Install backend dependencies
        shell: powershell
        run: |
          Set-Location "C:\sistemaarte\backend"
          npm install --production --prefer-offline --ignore-scripts

      # PM2 RELOAD
      - name: Reload PM2
        shell: powershell
        run: |
          $env:HOMEPATH = "C:\Users\Administrator"
          $env:HOME     = "C:\Users\Administrator"
          $status = pm2 describe sistemaarte-backend 2>&1
          if ($status -match 'online|stopped|errored') {
            pm2 reload sistemaarte-backend --update-env
          } else {
            pm2 start C:\sistemaarte\backend\server.js --name sistemaarte-backend
          }
          pm2 save

      - name: Concluido
        shell: powershell
        run: Write-Host "Deploy concluido em $(Get-Date -Format 'dd/MM/yyyy HH:mm:ss')"
