# ──────────────────────────────────────────────────────────
# Deploy Automático — Arte e Molduras
# Dispara em todo push para a branch main
# ──────────────────────────────────────────────────────────
name: Deploy Produção

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Clona o repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configura Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Instala dependências
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # 4. Gera o build de produção (pasta frontend/dist)
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      # 5. Envia os arquivos para o servidor via rsync + SSH
      #    Segredos necessários (configurar em Settings > Secrets):
      #      SSH_HOST     → IP ou domínio do servidor
      #      SSH_USER     → usuário SSH (ex: root ou ubuntu)
      #      SSH_KEY      → conteúdo da chave privada SSH (id_rsa)
      #      DEPLOY_PATH  → caminho no servidor (ex: /var/www/sistemaarte)
      - name: Deploy via SSH (rsync)
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          ARGS: '-avz --delete'
          SOURCE: 'frontend/dist/'
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: ${{ secrets.DEPLOY_PATH }}

      # 6. (Opcional) Notificação de sucesso
      - name: Notify deploy success
        if: success()
        run: |
          echo "✅ Deploy concluído com sucesso em $(date '+%d/%m/%Y %H:%M:%S')"

      # 7. Notificação de falha
      - name: Notify deploy failure
        if: failure()
        run: |
          echo "❌ Deploy FALHOU. Verifique os logs acima."

