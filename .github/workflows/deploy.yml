name: Deploy Produção

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── FRONTEND ────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy frontend → C:\sistemaarte\frontend\dist
        shell: powershell
        run: |
          $source = "${{ github.workspace }}\frontend\dist\"
          $dest   = "C:\sistemaarte\frontend\dist"
          if (!(Test-Path $dest)) { New-Item -ItemType Directory -Path $dest -Force }
          robocopy $source $dest /MIR /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      # ── BACKEND (apenas package.json é copiado, nunca node_modules/.env) ───
      - name: Sync backend source (nunca node_modules, data, .env)
        shell: powershell
        run: |
          $source = "${{ github.workspace }}\backend\"
          $dest   = "C:\sistemaarte\backend"
          if (!(Test-Path $dest)) { New-Item -ItemType Directory -Path $dest -Force }
          robocopy $source $dest /MIR /NFL /NDL /NJH /NJS `
            /XD node_modules data `
            /XF .env *.db
          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      - name: Garantir dependências do backend
        shell: powershell
        run: |
          Set-Location "C:\sistemaarte\backend"
          npm install --production --prefer-offline

      # ── PM2 ─────────────────────────────────────────────────────────────────
      - name: Restart PM2
        shell: powershell
        run: |
          pm2 restart sistemaarte-backend --update-env
          pm2 save

      - name: Concluído
        shell: powershell
        run: |
          Write-Host "✅ Deploy concluído em $(Get-Date -Format 'dd/MM/yyyy HH:mm:ss')"
