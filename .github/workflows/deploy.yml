name: Deploy Produção

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy para C:\sistemaarte
        shell: powershell
        run: |
          $source = "${{ github.workspace }}\frontend\dist\"
          $dest   = "C:\sistemaarte"
          if (!(Test-Path $dest)) { New-Item -ItemType Directory -Path $dest }
          robocopy $source $dest /MIR /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      - name: Concluído
        shell: powershell
        run: |
          Write-Host "✅ Deploy concluído em $(Get-Date -Format 'dd/MM/yyyy HH:mm:ss')"
